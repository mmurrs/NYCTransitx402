    // Zoom-responsive radius (min size for hover targets)
    function getR(base) {
      const z = map.getZoom();
      if (z >= 15) return base * 1.5;
      if (z >= 13) return base;
      if (z >= 11) return base * 0.7;
      return base * 0.5;
    }

    // Draw subway stations
    function drawSubway() {
      layers.subway.clearLayers();
      const r = Math.max(getR(4.5), 3);
      const active = layerActive.subway;
      const fill = active ? '#FF6319' : GRAY;
      subwayData.forEach((c, i) => {
        const parts = (subwayNameData[i] || '').split('|');
        const name = parts[0] || '';
        const lines = parts[1] || '';
        const m = L.circleMarker([c[1], c[0]], {
          radius: r, fillColor: fill, color: active ? '#c44d10' : '#222',
          weight: 1, opacity: active ? 0.9 : 0.3, fillOpacity: active ? 0.85 : 0.2
        }).addTo(layers.subway);
        if (name) {
          const linesHtml = lines ? '<span class="tip-meta">' + lines.replace(/,/g, ' ') + '</span>' : '';
          m.bindTooltip('<span class="tip-badge tip-badge-subway">S</span><span class="tip-name">' + name + '</span>' + linesHtml, {
            className: 'tip', direction: 'top', offset: [0, -8], sticky: true
          });
        }
      });
    }

    // Draw bus stops
    function drawBus() {
      layers.bus.clearLayers();
      const r = Math.max(getR(3), 2.5);
      const active = layerActive.bus;
      const fill = active ? '#00ADD0' : GRAY;
      busData.forEach((c, i) => {
        const name = (typeof busNames !== 'undefined' && busNames[i]) ? busNames[i] : '';
        const m = L.circleMarker([c[1], c[0]], {
          radius: r, fillColor: fill, color: active ? '#008ba6' : '#222',
          weight: 0.5, opacity: active ? 0.75 : 0.3, fillOpacity: active ? 0.6 : 0.15
        }).addTo(layers.bus);
        if (name) {
          m.bindTooltip('<span class="tip-badge tip-badge-bus">B</span><span class="tip-name">' + name + '</span>', {
            className: 'tip', direction: 'top', offset: [0, -8], sticky: true
          });
        }
      });
    }

    // Draw bike stations
    let bikeData = [];
    let bikeNames = [];
    function drawBike() {
      layers.bike.clearLayers();
      const r = Math.max(getR(2.5), 2);
      const active = layerActive.bike;
      const fill = active ? '#0073CE' : GRAY;
      bikeData.forEach((c, i) => {
        const name = bikeNames[i] || '';
        const m = L.circleMarker([c[1], c[0]], {
          radius: r, fillColor: fill, color: active ? '#005a9e' : '#222',
          weight: 0.5, opacity: active ? 0.85 : 0.3, fillOpacity: active ? 0.65 : 0.15
        }).addTo(layers.bike);
        if (name) {
          m.bindTooltip('<span class="tip-badge tip-badge-bike">CB</span><span class="tip-name">' + name + '</span>', {
            className: 'tip', direction: 'top', offset: [0, -8], sticky: true
          });
        }
      });
    }

    // Redraw on zoom — draw order: bus (bottom), bike, subway (top for tooltips)
    function redrawAll() { drawBus(); drawBike(); drawSubway(); }
    map.on('zoomend', redrawAll);

    // Fetch CitiBike live data with names
    fetch('https://gbfs.lyft.com/gbfs/2.3/bkn/en/station_information.json')
      .then(r => r.json())
      .then(d => {
        bikeData = d.data.stations.map(s => [s.lon, s.lat]);
        bikeNames = d.data.stations.map(s => s.name);
        document.getElementById('bike-count').textContent = bikeData.length.toLocaleString();
        redrawAll();
      })
      .catch(() => { redrawAll(); });

    // Initial draw (subway + bus)
    drawSubway();
    drawBus();

    // Toggle layers — grays out instead of removing
    function toggleLayer(el) {
      const name = el.dataset.layer;
      const isOn = el.classList.contains('on');
      if (isOn) {
        el.classList.remove('on');
        el.classList.add('off');
        layerActive[name] = false;
      } else {
        el.classList.remove('off');
        el.classList.add('on');
        layerActive[name] = true;
      }
      redrawAll();
    }

    // Listen for toggle messages from parent (embedded iframe)
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'toggleLayer' && e.data.layer) {
        const name = e.data.layer;
        layerActive[name] = !layerActive[name];
        // Also sync the panel toggle if visible
        const el = document.querySelector('[data-layer="' + name + '"]');
        if (el) {
          el.classList.toggle('on', layerActive[name]);
          el.classList.toggle('off', !layerActive[name]);
        }
        redrawAll();
      }
    });
  </script>
